name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Sync content from repo root
        run: bash site/scripts/sync-content.sh

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'harness-guide-ru' }}
        run: |
          SAFE_MSG=$(git log -1 --pretty=%s | LC_ALL=C tr -cd '[:print:]' | head -c 100)
          npx wrangler@latest pages deploy site/out --project-name="${CF_PAGES_PROJECT}" --branch main --commit-dirty=true --commit-message="${SAFE_MSG:-deploy}"
